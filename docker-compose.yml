services:
  # 后端服务
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    restart: unless-stopped

  # 前端服务（nginx 托管 + API 反向代理）
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-logs:
