services:
  # 后端服务
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://api.deepseek.com/v1
      - LLM_MODEL=deepseek-chat
      - CHROMA_DB_PATH=./data/chroma_db
      - RAG_TOP_K=3
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    restart: unless-stopped

  # 前端服务（nginx 托管 + API 反向代理）
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-logs:
